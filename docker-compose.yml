services:
  memory-api:
    image: ghcr.io/gexianmeng/selfmem:latest
    ports:
      - "127.0.0.1:8765:8765"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - API_KEY=changeme
    depends_on:
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data: